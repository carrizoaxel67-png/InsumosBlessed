[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

# ── Regla 1: Si el usuario TIENE el rol "admin" → dejar pasar
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
  force = true
  conditions = {Role = ["admin"]}

[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200
  force = true
  conditions = {Role = ["admin"]}

# ── Regla 2: Si NO tiene el rol o accede a /login
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/login.html"
  status = 302
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/login.html"
  status = 302
  force = true

# Cabeceras de seguridad para el admin
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-store"
